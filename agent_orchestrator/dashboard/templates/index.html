<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard</title>
<style>
  :root {
    --bg-primary: #0b0e14;
    --bg-secondary: #14181f;
    --bg-card: #1a1f2a;
    --bg-input: #1e2430;
    --border: #2a3140;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --blue: #3b82f6;
    --purple: #a855f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* Layout */
  .app-header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .app-header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .app-header h1 span { color: var(--accent); }
  .header-badge {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 12px;
    background: var(--bg-card);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .header-badge.online { color: var(--green); border-color: var(--green); }

  .input-row {
    display: flex;
    gap: 8px;
    flex: 1;
    min-width: 300px;
  }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-muted); }
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-danger { background: var(--red); color: #fff; }

  .app-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px 24px;
    min-height: calc(100vh - 68px);
  }
  @media (max-width: 900px) {
    .app-body { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-body {
    padding: 16px;
    flex: 1;
    overflow-y: auto;
  }

  /* Progress bar */
  .progress-section { padding: 0 16px 12px; }
  .progress-bar-track {
    height: 6px;
    background: var(--bg-card);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  /* Agent cards */
  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .agent-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }
  .agent-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    border-radius: 10px 0 0 10px;
    transition: background 0.3s;
  }
  .agent-card.status-pending::before { background: var(--text-muted); }
  .agent-card.status-running::before { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
  .agent-card.status-completed::before { background: var(--green); }
  .agent-card.status-failed::before { background: var(--red); }
  .agent-card.status-blocked::before { background: var(--orange); }

  .agent-id {
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .agent-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .agent-status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-pending .agent-status-badge { background: rgba(100,116,139,0.2); color: var(--text-muted); }
  .status-running .agent-status-badge { background: rgba(59,130,246,0.2); color: var(--blue); }
  .status-completed .agent-status-badge { background: rgba(34,197,94,0.2); color: var(--green); }
  .status-failed .agent-status-badge { background: rgba(239,68,68,0.2); color: var(--red); }
  .status-blocked .agent-status-badge { background: rgba(249,115,22,0.2); color: var(--orange); }

  /* Task DAG tree */
  .task-tree { list-style: none; padding-left: 0; }
  .task-tree li {
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 6px;
    background: var(--bg-card);
    border-left: 3px solid var(--text-muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.3s;
  }
  .task-tree li .task-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-muted);
  }
  .task-tree li .task-label { flex: 1; }
  .task-tree li .task-deps {
    font-size: 11px;
    color: var(--text-muted);
    font-family: monospace;
  }
  .task-tree li.task-pending { border-left-color: var(--text-muted); }
  .task-tree li.task-pending .task-dot { background: var(--text-muted); }
  .task-tree li.task-running { border-left-color: var(--blue); }
  .task-tree li.task-running .task-dot { background: var(--blue); }
  .task-tree li.task-completed { border-left-color: var(--green); }
  .task-tree li.task-completed .task-dot { background: var(--green); }
  .task-tree li.task-failed { border-left-color: var(--red); }
  .task-tree li.task-failed .task-dot { background: var(--red); }
  .task-tree li.task-blocked { border-left-color: var(--orange); }
  .task-tree li.task-blocked .task-dot { background: var(--orange); }

  /* Log panel */
  .log-panel {
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    font-size: 12px;
    line-height: 1.6;
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 12px;
    max-height: 400px;
    overflow-y: auto;
  }
  .log-entry {
    padding: 2px 0;
    display: flex;
    gap: 8px;
    animation: logFadeIn 0.2s ease;
  }
  @keyframes logFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-time {
    color: var(--text-muted);
    flex-shrink: 0;
    user-select: none;
  }
  .log-event {
    font-weight: 600;
    flex-shrink: 0;
    padding: 0 6px;
    border-radius: 3px;
    background: var(--bg-card);
  }
  .log-event.event-initializing { color: var(--text-secondary); }
  .log-event.event-adapter_ready { color: var(--green); }
  .log-event.event-tasks_decomposed { color: var(--purple); }
  .log-event.event-iteration { color: var(--yellow); }
  .log-event.event-task_started { color: var(--blue); }
  .log-event.event-task_completed { color: var(--green); }
  .log-event.event-completed { color: var(--accent); }
  .log-event.event-error { color: var(--red); }
  .log-data { color: var(--text-secondary); word-break: break-all; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 200px;
    color: var(--text-muted);
    font-size: 14px;
    gap: 8px;
  }
  .empty-state .icon { font-size: 40px; opacity: 0.4; }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <h1>Agent <span>Dashboard</span></h1>
  <span class="header-badge" id="connectionBadge">disconnected</span>
  <div class="input-row">
    <input type="text" id="goalInput" placeholder="Enter a goal for the agents..." autocomplete="off">
    <button class="btn btn-primary" id="runBtn" onclick="runGoal()">Run</button>
  </div>
</header>

<!-- Body -->
<div class="app-body">

  <!-- Left column: Agent cards + Task DAG -->
  <div style="display:flex; flex-direction: column; gap: 16px;">

    <!-- Agent cards -->
    <div class="panel" style="flex: 1;">
      <div class="panel-header">
        <span>Agents</span>
        <span style="font-size:12px; text-transform:none; letter-spacing:0;" id="agentCount">0 active</span>
      </div>
      <div class="progress-section">
        <div class="progress-label">
          <span>Overall progress</span>
          <span id="progressText">0 / 0</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
      </div>
      <div class="panel-body">
        <div class="agent-grid" id="agentGrid">
          <div class="empty-state">
            <div class="icon">&#9733;</div>
            <div>No agents yet. Enter a goal and click Run.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Task DAG -->
    <div class="panel" style="flex: 0 0 auto; max-height: 300px;">
      <div class="panel-header"><span>Task Dependencies</span></div>
      <div class="panel-body">
        <ul class="task-tree" id="taskTree">
          <li class="empty-state" style="list-style:none; padding:0;">
            <div class="icon">&#9776;</div>
            <div>No tasks yet.</div>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Right column: Logs -->
  <div class="panel">
    <div class="panel-header">
      <span>Event Log</span>
      <button class="btn btn-danger" style="padding:4px 14px; font-size:12px;" onclick="clearLogs()">Clear</button>
    </div>
    <div class="panel-body">
      <div class="log-panel" id="logPanel">
        <div class="empty-state" style="min-height:100px;">
          <div class="icon">&#9998;</div>
          <div>Waiting for events...</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ---- State ---------------------------------------------------------------
const state = {
  tasks: {},        // taskId -> { id, title, status, dependencies }
  agents: {},       // agentId -> { agent_id, title, status }
  taskCount: 0,
  completedCount: 0,
  running: false,
};

// ---- SSE -----------------------------------------------------------------
let eventSource = null;

function connectSSE() {
  if (eventSource) eventSource.close();
  eventSource = new EventSource("/events");

  eventSource.onopen = () => {
    document.getElementById("connectionBadge").textContent = "connected";
    document.getElementById("connectionBadge").classList.add("online");
  };

  eventSource.addEventListener("initializing", (e) => handleEvent("initializing", JSON.parse(e.data)));
  eventSource.addEventListener("adapter_ready", (e) => handleEvent("adapter_ready", JSON.parse(e.data)));
  eventSource.addEventListener("tasks_decomposed", (e) => handleEvent("tasks_decomposed", JSON.parse(e.data)));
  eventSource.addEventListener("iteration", (e) => handleEvent("iteration", JSON.parse(e.data)));
  eventSource.addEventListener("task_started", (e) => handleEvent("task_started", JSON.parse(e.data)));
  eventSource.addEventListener("task_completed", (e) => handleEvent("task_completed", JSON.parse(e.data)));
  eventSource.addEventListener("completed", (e) => handleEvent("completed", JSON.parse(e.data)));
  eventSource.addEventListener("error", (e) => handleEvent("error", JSON.parse(e.data)));

  eventSource.onerror = () => {
    document.getElementById("connectionBadge").textContent = "disconnected";
    document.getElementById("connectionBadge").classList.remove("online");
    // Auto-reconnect after 3s
    setTimeout(connectSSE, 3000);
  };

  // Generic fallback for any unnamed event
  eventSource.onmessage = (e) => {
    try { handleEvent("message", JSON.parse(e.data)); } catch(_) {}
  };
}

// ---- Event handling ------------------------------------------------------

function handleEvent(event, data) {
  addLog(event, data);

  switch (event) {
    case "initializing":
      state.tasks = {};
      state.agents = {};
      state.taskCount = 0;
      state.completedCount = 0;
      state.running = true;
      updateRunButton(true);
      break;

    case "tasks_decomposed":
      if (data.tasks) {
        data.tasks.forEach((t, i) => {
          const id = "task_" + i;
          state.tasks[id] = { id, title: t, status: "pending", dependencies: [] };
        });
        state.taskCount = data.count || data.tasks.length;
      }
      break;

    case "task_started":
      // Use data.id as agent identifier
      if (data.id) {
        state.agents[data.id] = { agent_id: data.id, title: data.title || data.id, status: "running" };
        if (state.tasks[data.id]) state.tasks[data.id].status = "running";
      }
      break;

    case "task_completed":
      if (data.id) {
        const status = (data.status === "FAILED") ? "failed" : "completed";
        if (state.agents[data.id]) state.agents[data.id].status = status;
        if (state.tasks[data.id]) state.tasks[data.id].status = status;
        if (status === "completed") state.completedCount++;
      }
      break;

    case "completed":
      state.running = false;
      updateRunButton(false);
      break;

    case "error":
      state.running = false;
      updateRunButton(false);
      break;
  }

  render();
}

// ---- Logging -------------------------------------------------------------

function addLog(event, data) {
  const panel = document.getElementById("logPanel");
  // Remove empty state if present
  const empty = panel.querySelector(".empty-state");
  if (empty) empty.remove();

  const now = new Date();
  const time = now.toLocaleTimeString();
  const entry = document.createElement("div");
  entry.className = "log-entry";

  const timeSpan = document.createElement("span");
  timeSpan.className = "log-time";
  timeSpan.textContent = time;

  const eventSpan = document.createElement("span");
  eventSpan.className = "log-event event-" + event;
  eventSpan.textContent = event;

  const dataSpan = document.createElement("span");
  dataSpan.className = "log-data";
  dataSpan.textContent = JSON.stringify(data);

  entry.appendChild(timeSpan);
  entry.appendChild(eventSpan);
  entry.appendChild(dataSpan);
  panel.appendChild(entry);

  // Auto-scroll
  const scrollable = panel.parentElement;
  scrollable.scrollTop = scrollable.scrollHeight;

  // Limit entries to 500
  while (panel.children.length > 500) {
    panel.removeChild(panel.firstChild);
  }
}

function clearLogs() {
  const panel = document.getElementById("logPanel");
  panel.innerHTML = `<div class="empty-state" style="min-height:100px;"><div class="icon">&#9998;</div><div>Waiting for events...</div></div>`;
}

// ---- Run goal ------------------------------------------------------------

async function runGoal() {
  const input = document.getElementById("goalInput");
  const goal = input.value.trim();
  if (!goal) return;

  const btn = document.getElementById("runBtn");
  btn.disabled = true;
  btn.textContent = "Running...";

  try {
    const resp = await fetch("/api/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ goal }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      addLog("error", { message: err.error || "Failed to start" });
    } else {
      addLog("system", { message: "Orchestration started: " + goal });
    }
  } catch (err) {
    addLog("error", { message: err.toString() });
  }
}

function updateRunButton(running) {
  const btn = document.getElementById("runBtn");
  btn.disabled = running;
  btn.textContent = running ? "Running..." : "Run";
}

// ---- Render --------------------------------------------------------------

function render() {
  renderAgents();
  renderTasks();
  renderProgress();
}

function renderAgents() {
  const grid = document.getElementById("agentGrid");
  const ids = Object.keys(state.agents);

  if (ids.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">&#9733;</div><div>No agents yet. Enter a goal and click Run.</div></div>`;
    document.getElementById("agentCount").textContent = "0 active";
    return;
  }

  document.getElementById("agentCount").textContent = ids.length + " agent" + (ids.length > 1 ? "s" : "");

  let html = "";
  for (const id of ids) {
    const a = state.agents[id];
    html +=
      `<div class="agent-card status-${a.status}">` +
        `<div class="agent-id">${a.agent_id}</div>` +
        `<div class="agent-title">${escapeHtml(a.title)}</div>` +
        `<span class="agent-status-badge">${a.status}</span>` +
      `</div>`;
  }
  grid.innerHTML = html;
}

function renderTasks() {
  const tree = document.getElementById("taskTree");
  const ids = Object.keys(state.tasks);

  if (ids.length === 0) {
    tree.innerHTML = `<li class="empty-state" style="list-style:none; padding:0;"><div class="icon">&#9776;</div><div>No tasks yet.</div></li>`;
    return;
  }

  let html = "";
  for (const id of ids) {
    const t = state.tasks[id];
    const deps = t.dependencies && t.dependencies.length > 0
      ? `<span class="task-deps">dep: ${t.dependencies.join(", ")}</span>`
      : "";
    html +=
      `<li class="task-${t.status}">` +
        `<span class="task-dot"></span>` +
        `<span class="task-label">${escapeHtml(t.title)}</span>` +
        deps +
      `</li>`;
  }
  tree.innerHTML = html;
}

function renderProgress() {
  const total = state.taskCount || Object.keys(state.tasks).length;
  const done = state.completedCount;
  document.getElementById("progressText").textContent = done + " / " + total;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
}

// ---- Utils ---------------------------------------------------------------

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ---- Bootstrap -----------------------------------------------------------

// Allow Enter key to submit
document.getElementById("goalInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") runGoal();
});

connectSSE();
</script>
</body>
</html>
